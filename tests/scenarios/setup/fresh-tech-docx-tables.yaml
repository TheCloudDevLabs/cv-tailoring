name: fresh-tech-docx-tables
description: Fresh install with a table-based .docx CV to verify table extraction works
skill: cv-setup
workspace: tests/workspace/fresh-tech-docx-tables

inputs:
  name: "Alex Johnson"
  title: "Cloud Engineer"
  email: "alex.johnson@example.com"
  phone: "+1 555 000 0000"
  location: "Seattle, WA"
  linkedin: "linkedin.com/in/alexjohnson"
  github: ""
  website: ""
  additional_info: []
  domains:
    - "Technology / software / startups"
  compliance:
    - "Information security certification (e.g. ISO 27001, SOC 2, Cyber Essentials)"
  domain_notes: ""
  spelling: "US English"
  tone: "Neutral and professional"
  banned_words: "Use the suggested defaults"
  team_framing: "Lead with my contribution, note team context where relevant"
  target_pages: "2 pages"
  sections:
    - "Professional summary / profile"
    - "Core skills"
    - "Employment history"
    - "Certifications and training"
  cv_files: "Files are ready"
  cv_files_to_use:
    - "tests/fixtures/cvs/alex-johnson-table-layout.docx"

expected_outputs:
  - file: config.yaml
    must_contain:
      - "Alex Johnson"
      - "US English"
  - file: references/cv-variants.md
    must_contain:
      - "alex-johnson-table-layout"
  - file: cv-variants/alex-johnson-table-layout.md
    must_contain:
      - "Alex Johnson"
      - "Cloud Engineer"
      - "Acme Corp"
      - "AWS"
      - "Terraform"
      - "SOC 2"

pass_criteria:
  - .docx file is converted to .md
  - Converted .md contains content from both paragraphs and tables
  - Table cell content (skills, role details) is present in the .md
  - references/cv-variants.md lists the ingested variant
