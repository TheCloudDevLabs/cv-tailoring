name: Docs Update

on:
  pull_request:
    branches: [main]
    paths:
      - '.claude/skills/**'
      - '.claude.ai/skills/**'
      - 'generate_cv.py'
      - 'config.example.yaml'
      - 'scripts/**'
      - 'references/**'

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  update-docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0

      - name: Update docs with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "clouddevlabsclaude"
          prompt: |
            Your job is to ensure the documentation accurately describes every user-facing feature and behaviour in the skill files and code.

            Step 1: Read ALL of these source-of-truth files in full:
            - .claude/skills/cv-setup/SKILL.md
            - .claude/skills/cv-tailoring/SKILL.md
            - .claude.ai/skills/cv-tailoring-setup/SKILL.md
            - generate_cv.py
            - config.example.yaml

            Step 2: Read ALL of these documentation files in full:
            - README.md
            - docs/getting-started-claude-code.md
            - docs/getting-started-claude-ai.md
            - docs/how-it-works.md

            Step 3: Compare. For every user-facing capability in the skill files (input methods, process steps, output types, configuration options, commands), check whether the documentation accurately describes it. Look for:
            - Features in the skills that the docs don't mention at all
            - Features the docs describe that no longer work that way
            - Process steps that have changed (new steps added, steps reordered, steps removed)
            - New input methods, output types, or configuration options not reflected in docs

            Step 4: Update any documentation file that is out of date. Apply changes directly — do not list what needs changing, just fix it.

            Rules:
            - Only update for substantive, user-facing differences (new features, changed behaviour, renamed commands, new requirements)
            - Do not make cosmetic or stylistic changes
            - Preserve the existing tone, structure, and formatting of each document
            - If everything is already accurate, do nothing

            If you make changes, commit them with the message "docs: update for recent skill/code changes".
