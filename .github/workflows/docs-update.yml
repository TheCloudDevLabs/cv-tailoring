name: Docs Update

on:
  pull_request:
    branches: [main]
    paths:
      - '.claude/skills/**'
      - '.claude.ai/skills/**'
      - 'generate_cv.py'
      - 'config.example.yaml'
      - 'scripts/**'
      - 'references/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Update docs with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          direct_prompt: |
            Run this command and review the output:

            git diff origin/main...HEAD -- .claude/skills/ .claude.ai/skills/ generate_cv.py config.example.yaml scripts/ references/

            If any of these documentation files need updating to reflect user-facing changes, update them:
            - README.md
            - docs/getting-started-claude-code.md
            - docs/getting-started-claude-ai.md
            - docs/how-it-works.md

            Rules:
            - Only update docs for substantive, user-facing changes (new features, changed behaviour, renamed commands, new requirements)
            - Do not make cosmetic or stylistic changes
            - Preserve the existing tone, structure, and formatting of each document
            - If no updates are needed, do nothing

            If you make changes, commit them to this branch with the message "docs: update for recent skill/code changes".
