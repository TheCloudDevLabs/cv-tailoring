name: Docs Update

on:
  push:
    branches: [main]
    paths:
      - '.claude/skills/**'
      - 'generate_cv.py'
      - 'config.example.yaml'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Update docs with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Run this command and review the output:

            git diff HEAD~1 HEAD -- .claude/skills/ generate_cv.py config.example.yaml

            If any of these documentation files need updating to reflect user-facing changes, update them:
            - README.md
            - docs/getting-started-claude-code.md
            - docs/getting-started-claude-ai.md
            - docs/how-it-works.md

            Rules:
            - Only update docs for substantive, user-facing changes (new features, changed behaviour, renamed commands, new requirements)
            - Do not make cosmetic or stylistic changes
            - Preserve the existing tone, structure, and formatting of each document
            - If no updates are needed, do nothing and do not create a PR

            If you make any changes, create a pull request titled "docs: automated update for recent skill/code changes" with a clear description of what was updated and why.
