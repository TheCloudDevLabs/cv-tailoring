name: multi-additional-info
description: Tests multiple additional personal info selections combining clearance, nationality, and work rights
skill: cv-setup
workspace: tests/workspace/multi-additional-info

inputs:
  name: "Alex Johnson"
  title: "Security Engineer"
  email: "alex.johnson@example.com"
  phone: "+1 555 000 0000"
  location: "Washington, DC"
  linkedin: "linkedin.com/in/alexjohnson"
  github: ""
  website: ""
  additional_info:
    - option: "Security or government clearance"
      value: "TS/SCI"
    - option: "Nationality"
      value: "US Citizen"
    - option: "Work authorisation or visa status"
      value: "Full working rights"
  domains:
    - "Defence and intelligence"
    - "Technology / software / startups"
  compliance:
    - "Government cybersecurity frameworks (e.g. NIST CSF, ISO 27001, ISM, Essential Eight, Cyber Essentials)"
    - "Classified or national security environments (e.g. DISP, security vetting, controlled facilities)"
    - "Cloud compliance frameworks (e.g. FedRAMP, StateRAMP, national cloud standards)"
  domain_notes: ""
  spelling: "US English"
  tone: "Neutral and professional"
  banned_words: "Use the suggested defaults"
  team_framing: "Lead with my contribution, note team context where relevant"
  target_pages: "2 pages"
  sections:
    - "Professional summary / profile"
    - "Core skills"
    - "Employment history"
    - "Certifications and training"
  cv_files: "I'll add them later"

expected_outputs:
  - file: config.yaml
    must_contain:
      - "TS/SCI"
      - "US Citizen"
      - "Full working rights"
  - file: references/writing-standards.md
    must_contain:
      - "FedRAMP"
      - "NIST"

pass_criteria:
  - additional_info in config.yaml contains all three values joined by " | "
  - config.yaml value is "TS/SCI | US Citizen | Full working rights" (or similar combination)
  - writing-standards.md contains FedRAMP and NIST cloud compliance references
